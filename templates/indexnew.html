<!DOCTYPE html>
<html>
<head>
    <title>HDI Predictor</title>
    <style>
        body { font-family: Arial; background-color: #f0f8ff; text-align: center; }
        h1 { color: #2c3e50; }
        form { background: white; padding: 30px; 
               display: inline-block; border-radius: 10px; 
               box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        input { width: 250px; padding: 8px; margin: 8px; border-radius: 5px; }
        button { background: #2980b9; color: white; 
                 padding: 10px 30px; border: none; 
                 border-radius: 5px; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Human Development Index Predictor</h1>
    <form action="/predict" method="POST">
        <h3>Enter Country Details:</h3><br>
        <label>Life Expectancy:</label><br>
        <input type="number" name="life_expectancy" step="0.01" required><br>
        <label>Expected Years of Schooling:</label><br>
        <input type="number" name="expected_schooling" step="0.01" required><br>
        <label>Mean Years of Schooling:</label><br>
        <input type="number" name="mean_schooling" step="0.01" required><br>
        <label>GNI Per Capita:</label><br>
        <input type="number" name="gni_per_capita" step="0.01" required><br><br>
        <button type="submit">Predict HDI</button>
    </form>
</body>
</html>
